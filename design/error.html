<body class="bg-surface text-on-surface antialiased overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-neutral-50/80 dark:bg-black/80 backdrop-blur-xl flex items-center justify-center px-5 h-16 w-full">

<main class="min-h-screen flex flex-col items-center justify-center px-5 pb-20 pt-16">

<div class="w-full max-w-lg flex flex-col items-center text-center">

<!-- Tonal Layering "Paper-on-Glass" Effect for the Icon -->
<div class="relative w-64 h-64 bg-surface-container-low rounded-xl flex items-center justify-center overflow-hidden">

<div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle, #000 1px, transparent 1px); background-size: 20px 20px;"></div>
<!-- Line Art Illustration (Broken Marker Concept) -->
<div class="relative flex flex-col items-center">
<span class="material-symbols-outlined text-neutral-300 text-[120px] select-none" data-icon="location_off" style="font-variation-settings: 'wght' 100;">location_off</span>
<!-- Asymmetric Overlay Element -->
<div class="absolute -bottom-2 -right-4 bg-surface-container-lowest shadow-[0_12px_24px_rgba(0,0,0,0.06)] p-4 rounded-xl rotate-6 border border-outline-variant/10">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="search_off">search_off</span>
</div>
</div>
</div>
<!-- Editorial Metadata (Small side-tag) -->
<div class="absolute top-0 right-0 transform translate-x-4 -translate-y-4">
<span class="bg-primary text-on-primary-container px-3 py-1 rounded-full text-[10px] font-lexend font-bold uppercase tracking-widest shadow-sm">
                        Error 404
                    </span>
</div>
</div>
<!-- Content Hierarchy -->
<div class="space-y-6">
<!-- Aggressive Typographic Scale -->
<div class="space-y-2">
<p class="text-on-surface-variant text-[12px] font-lexend font-bold uppercase tracking-[0.2em] mb-2">Trạng thái hệ thống</p>
<h2 class="text-4xl md:text-5xl font-lexend font-extrabold text-primary tracking-tight leading-none">
                        Không tìm thấy trang
                    </h2>
</div>
<p class="text-on-surface-variant text-lg max-w-sm mx-auto leading-relaxed font-medium">
                    Có vẻ như trang bạn đang tìm kiếm không tồn tại hoặc đã được di dời.
                </p>
<!-- High-Impact Action -->
<div class="pt-8">
<a class="inline-flex items-center justify-center bg-primary text-on-primary-container h-[56px] px-10 rounded-xl font-lexend font-bold text-base transition-all active:scale-95 hover:bg-primary-container shadow-sm group" href="#">
<span class="material-symbols-outlined mr-3 transition-transform group-hover:-translate-x-1" data-icon="map">map</span>

</div>
</div>

<div class="fixed inset-0 pointer-events-none z-[-1] opacity-[0.03]">
<svg height="100%" width="100%" xmlns="http://www.w3.org/2000/svg">
<filter id="noise">
<feturbulence basefrequency="0.6" numoctaves="3" stitchtiles="stitch" type="fractalNoise"></feturbulence>
</filter>
<rect filter="url(#noise)" height="100%" width="100%"></rect>
</svg>
