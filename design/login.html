<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SportMatch - Đăng nhập</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#1a1c1c",
                        "on-tertiary": "#e2e2e2",
                        "inverse-on-surface": "#f1f1f1",
                        "primary-container": "#343b4c",
                        "error": "#ba1a1a",
                        "tertiary": "#3b3b3b",
                        "on-surface-variant": "#474747",
                        "primary-fixed": "#575e70",
                        "surface-dim": "#dadada",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#5e5e5e",
                        "tertiary-fixed-dim": "#474747",
                        "surface-variant": "#e2e2e2",
                        "on-primary-fixed-variant": "#dce2f7",
                        "surface-container-high": "#e8e8e8",
                        "inverse-surface": "#2f3131",
                        "error-container": "#ffdad6",
                        "surface": "#f9f9f9",
                        "on-primary-fixed": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "outline-variant": "#c6c6c6",
                        "on-tertiary-fixed": "#ffffff",
                        "on-secondary-fixed": "#121c2a",
                        "secondary-fixed-dim": "#a1acbf",
                        "secondary-container": "#cbd5e9",
                        "outline": "#777777",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#e2e2e2",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#404758",
                        "on-tertiary-container": "#ffffff",
                        "tertiary-container": "#747474",
                        "surface-container-low": "#f3f3f3",
                        "on-secondary-fixed-variant": "#323c4c",
                        "on-background": "#1a1c1c",
                        "inverse-primary": "#c0c6db",
                        "on-primary": "#dce2f7",
                        "secondary": "#555f70",
                        "primary": "#000000",
                        "on-secondary-container": "#121c2a",
                        "background": "#f9f9f9",
                        "secondary-fixed": "#bdc7db",
                        "on-error-container": "#410002",
                        "surface-tint": "#575e70",
                        "surface-container-highest": "#e2e2e2",
                        "surface-container": "#eeeeee",
                        "on-primary-container": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Lexend"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/10">
<!-- Top Navigation / Logo Anchor -->
<header class="bg-white/80 dark:bg-black/80 backdrop-blur-xl docked full-width top-0 sticky z-50 shadow-[0_12px_24px_rgba(26,28,28,0.06)] dark:shadow-none flex items-center justify-between px-5 h-16 w-full">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-colors rounded-full active:opacity-70 active:scale-95">
<span class="material-symbols-outlined text-black dark:text-white" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<div class="font-['Lexend'] text-2xl font-black tracking-tighter text-black dark:text-white uppercase">SPORTMATCH</div>
<div class="w-10"></div> <!-- Balance spacer -->
</header>
<main class="min-h-[calc(100vh-64px)] flex flex-col items-center justify-center px-5 pb-12">
<div class="w-full max-w-[335px] space-y-8">
<!-- Headline Section -->
<div class="text-center space-y-2">
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-primary">Đăng nhập</h1>
<p class="text-on-surface-variant font-medium text-sm">Chào mừng bạn quay lại với đấu trường.</p>
</div>
<!-- Form Section -->
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="font-headline text-[10px] font-bold tracking-widest uppercase text-on-surface-variant px-1" for="email">Email</label>
<div class="relative">
<input class="w-full h-14 bg-surface-container-low border-0 rounded-xl px-4 font-body text-base placeholder:text-outline focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200 shadow-sm" id="email" placeholder="username@email.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="font-headline text-[10px] font-bold tracking-widest uppercase text-on-surface-variant px-1" for="password">Mật khẩu</label>
<div class="relative">
<input class="w-full h-14 bg-surface-container-low border-0 rounded-xl px-4 font-body text-base placeholder:text-outline focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200 shadow-sm" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<div class="flex justify-end">
<a class="font-body text-xs font-semibold text-primary underline decoration-surface-variant hover:decoration-primary transition-all underline-offset-4" href="#">Quên mật khẩu?</a>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full h-14 bg-primary text-white font-headline font-bold text-base rounded-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-xl shadow-primary/10">
                        Đăng nhập
                        <span class="material-symbols-outlined text-[18px]" data-icon="login">login</span>
</button>
</div>
</form>
<!-- Social/Alternative Section -->
<div class="space-y-6 pt-2">
<div class="flex items-center gap-4">
<div class="h-[1px] flex-1 bg-surface-container-highest"></div>
<span class="font-headline text-[10px] font-bold tracking-widest uppercase text-outline">Hoặc</span>
<div class="h-[1px] flex-1 bg-surface-container-highest"></div>
</div>
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center h-12 rounded-xl border border-outline-variant/15 hover:bg-white transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="google">google</span>
</button>
<button class="flex items-center justify-center h-12 rounded-xl border border-outline-variant/15 hover:bg-white transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="apple">ios</span>
</button>
</div>
</div>
</div>
</main>
<!-- Footer / Bottom Anchor -->
<footer class="w-full py-12 bg-zinc-50 dark:bg-zinc-950 flex flex-col items-center gap-6 text-center">
<div class="font-['Inter'] text-[12px] font-medium tracking-normal text-on-surface-variant">
            Chưa có tài khoản? 
            <a class="text-black dark:text-white font-bold underline decoration-zinc-300 ml-1 hover:text-primary transition-all" href="#">Đăng ký</a>
</div>
<div class="space-y-4">
<div class="flex justify-center gap-6">
<a class="font-['Inter'] text-[10px] font-medium tracking-widest uppercase text-zinc-400 hover:text-black transition-all" href="#">Support</a>
<a class="font-['Inter'] text-[10px] font-medium tracking-widest uppercase text-zinc-400 hover:text-black transition-all" href="#">Privacy</a>
<a class="font-['Inter'] text-[10px] font-medium tracking-widest uppercase text-zinc-400 hover:text-black transition-all" href="#">Terms</a>
</div>
<p class="font-['Inter'] text-[10px] font-medium tracking-widest uppercase text-zinc-400">© 2024 SPORTMATCH. ENGINEERED FOR PERFORMANCE.</p>
</div>
</footer>
</body></html>
