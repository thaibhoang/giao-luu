<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#1a1c1c",
                    "on-tertiary": "#e2e2e2",
                    "inverse-on-surface": "#f1f1f1",
                    "primary-container": "#343b4c",
                    "error": "#ba1a1a",
                    "tertiary": "#3b3b3b",
                    "on-surface-variant": "#474747",
                    "primary-fixed": "#575e70",
                    "surface-dim": "#dadada",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed": "#5e5e5e",
                    "tertiary-fixed-dim": "#474747",
                    "surface-variant": "#e2e2e2",
                    "on-primary-fixed-variant": "#dce2f7",
                    "surface-container-high": "#e8e8e8",
                    "inverse-surface": "#2f3131",
                    "error-container": "#ffdad6",
                    "surface": "#f9f9f9",
                    "on-primary-fixed": "#ffffff",
                    "surface-bright": "#f9f9f9",
                    "outline-variant": "#c6c6c6",
                    "on-tertiary-fixed": "#ffffff",
                    "on-secondary-fixed": "#121c2a",
                    "secondary-fixed-dim": "#a1acbf",
                    "secondary-container": "#cbd5e9",
                    "outline": "#777777",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed-variant": "#e2e2e2",
                    "on-error": "#ffffff",
                    "primary-fixed-dim": "#404758",
                    "on-tertiary-container": "#ffffff",
                    "tertiary-container": "#747474",
                    "surface-container-low": "#f3f3f3",
                    "on-secondary-fixed-variant": "#323c4c",
                    "on-background": "#1a1c1c",
                    "inverse-primary": "#c0c6db",
                    "on-primary": "#dce2f7",
                    "secondary": "#555f70",
                    "primary": "#000000",
                    "on-secondary-container": "#121c2a",
                    "background": "#f9f9f9",
                    "secondary-fixed": "#bdc7db",
                    "on-error-container": "#410002",
                    "surface-tint": "#575e70",
                    "surface-container-highest": "#e2e2e2",
                    "surface-container": "#eeeeee",
                    "on-primary-container": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Lexend"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9f9;
        }
        .headline-font {
            font-family: 'Lexend', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-[812px] w-[375px] mx-auto overflow-hidden shadow-2xl relative">
<!-- Top App Bar (Shared Component Strategy) -->
<header class="bg-white/80 backdrop-blur-xl flex items-center justify-between px-5 h-16 w-full docked full-width top-0 sticky z-50 shadow-[0_12px_24px_rgba(26,28,28,0.06)]">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-zinc-100 transition-colors active:opacity-70 active:scale-95">
<span class="material-symbols-outlined text-black" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-['Lexend'] font-bold tracking-tight text-black uppercase">SPORTMATCH</span>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="px-5 pt-12 flex flex-col min-h-[calc(812px-64px-120px)]">
<!-- Editorial Header -->
<div class="mb-12">
<span class="font-label text-[10px] font-medium tracking-[0.2em] uppercase text-on-surface-variant mb-2 block">Security Access</span>
<h1 class="headline-font text-4xl font-extrabold tracking-tight text-primary leading-tight">Mật khẩu mới</h1>
<p class="text-on-surface-variant text-sm mt-4 leading-relaxed max-w-[280px]">Tạo mật khẩu mạnh để bảo vệ tài khoản SportMatch của bạn.</p>
</div>
<!-- Form Section -->
<section class="space-y-6">
<div class="space-y-2">
<label class="font-label text-[11px] font-bold uppercase tracking-wider text-on-surface ml-1">Mật khẩu mới</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-container-low border-none rounded-xl focus:ring-0 focus:bg-surface-container-lowest focus:border-b focus:border-primary transition-all placeholder:text-outline/50" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="space-y-2">
<label class="font-label text-[11px] font-bold uppercase tracking-wider text-on-surface ml-1">Xác nhận mật khẩu</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-container-low border-none rounded-xl focus:ring-0 focus:bg-surface-container-lowest focus:border-b focus:border-primary transition-all placeholder:text-outline/50" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="pt-4">
<button class="w-full h-14 bg-primary text-on-primary-container font-headline font-semibold text-sm rounded-xl flex items-center justify-center gap-2 active:scale-[0.98] transition-all shadow-lg shadow-black/5">
                    Cập nhật mật khẩu
                    <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</section>
<!-- Dynamic Success Feedback (Simulated Toast) -->
<div class="mt-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="bg-surface-container-lowest p-4 rounded-xl flex items-center gap-4 shadow-[0_12px_24px_rgba(26,28,28,0.06)] border border-outline-variant/10">
<div class="w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-600">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="flex-1">
<p class="font-label text-xs font-bold text-on-surface">Đã cập nhật — chuyển đến đăng nhập</p>
<p class="text-[10px] text-on-surface-variant">Tài khoản của bạn đã sẵn sàng.</p>
</div>
</div>
</div>
</main>
<!-- Footer (Shared Component Strategy) -->
<footer class="absolute bottom-0 w-full bg-zinc-50 py-8 flex flex-col items-center gap-4 text-center">
<div class="flex gap-6">
<a class="font-['Inter'] text-[10px] font-medium tracking-widest uppercase text-zinc-400 hover:text-black transition-all" href="#">Support</a>
<a class="font-['Inter'] text-[10px] font-medium tracking-widest uppercase text-zinc-400 hover:text-black transition-all" href="#">Privacy</a>
<a class="font-['Inter'] text-[10px] font-medium tracking-widest uppercase text-zinc-400 hover:text-black transition-all" href="#">Terms</a>
</div>
<p class="font-['Inter'] text-[10px] font-medium tracking-widest uppercase text-zinc-400">© 2024 SPORTMATCH. ENGINEERED FOR PERFORMANCE.</p>
</footer>
<!-- Decorative Kinetic Element -->
<div class="fixed top-0 right-0 -z-10 opacity-5 pointer-events-none">
<svg fill="none" height="400" viewbox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
<path d="M400 0H0V400H400V0Z" fill="white"></path>
<path d="M400 0L0 400" stroke="black" stroke-width="80"></path>
</svg>
</div>
</body></html>
