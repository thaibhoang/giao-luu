<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#1a1c1c",
                    "on-tertiary": "#e2e2e2",
                    "inverse-on-surface": "#f1f1f1",
                    "primary-container": "#343b4c",
                    "error": "#ba1a1a",
                    "tertiary": "#3b3b3b",
                    "on-surface-variant": "#474747",
                    "primary-fixed": "#575e70",
                    "surface-dim": "#dadada",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed": "#5e5e5e",
                    "tertiary-fixed-dim": "#474747",
                    "surface-variant": "#e2e2e2",
                    "on-primary-fixed-variant": "#dce2f7",
                    "surface-container-high": "#e8e8e8",
                    "inverse-surface": "#2f3131",
                    "error-container": "#ffdad6",
                    "surface": "#f9f9f9",
                    "on-primary-fixed": "#ffffff",
                    "surface-bright": "#f9f9f9",
                    "outline-variant": "#c6c6c6",
                    "on-tertiary-fixed": "#ffffff",
                    "on-secondary-fixed": "#121c2a",
                    "secondary-fixed-dim": "#a1acbf",
                    "secondary-container": "#cbd5e9",
                    "outline": "#777777",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed-variant": "#e2e2e2",
                    "on-error": "#ffffff",
                    "primary-fixed-dim": "#404758",
                    "on-tertiary-container": "#ffffff",
                    "tertiary-container": "#747474",
                    "surface-container-low": "#f3f3f3",
                    "on-secondary-fixed-variant": "#323c4c",
                    "on-background": "#1a1c1c",
                    "inverse-primary": "#c0c6db",
                    "on-primary": "#dce2f7",
                    "secondary": "#555f70",
                    "primary": "#000000",
                    "on-secondary-container": "#121c2a",
                    "background": "#f9f9f9",
                    "secondary-fixed": "#bdc7db",
                    "on-error-container": "#410002",
                    "surface-tint": "#575e70",
                    "surface-container-highest": "#e2e2e2",
                    "surface-container": "#eeeeee",
                    "on-primary-container": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Lexend"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; background-color: #f9f9f9; }
        .lexend-font { font-family: 'Lexend', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface min-h-[812px] w-[375px] mx-auto overflow-x-hidden flex flex-col items-center">
<!-- TopAppBar Fragment - Suppression Rule: Login/Register usually suppress full nav, but brand presence remains -->
<header class="bg-white/80 backdrop-blur-xl text-black font-['Lexend'] font-bold tracking-tight uppercase flex items-center justify-between px-5 h-16 w-full sticky top-0 z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-black" data-icon="arrow_back">arrow_back</span>
</div>
<div class="font-['Lexend'] text-2xl font-black tracking-tighter text-black">SPORTMATCH</div>
<div class="w-6"></div> <!-- Spacer for centering logo -->
</header>
<main class="flex-1 w-full px-5 pt-12 pb-10 flex flex-col">
<!-- Editorial Hero Branding -->
<div class="mb-12">
<span class="text-[10px] font-bold tracking-[0.2em] text-on-surface-variant uppercase mb-2 block">Premium Membership</span>
<h1 class="lexend-font text-4xl font-extrabold tracking-tight text-primary leading-tight">
                Tạo tài khoản
            </h1>
</div>
<!-- Registration Form -->
<form class="space-y-6 flex-1">
<!-- Input Group: Email -->
<div class="space-y-2">
<label class="text-[10px] font-bold tracking-widest text-on-surface-variant uppercase ml-1">Email</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-container-low border-none rounded-xl focus:bg-surface-container-lowest focus:ring-0 focus:border-b focus:border-primary transition-all text-primary placeholder:text-outline/50 font-medium" placeholder="example@sportmatch.com" type="email"/>
</div>
</div>
<!-- Input Group: Password -->
<div class="space-y-2">
<label class="text-[10px] font-bold tracking-widest text-on-surface-variant uppercase ml-1">Mật khẩu</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-container-low border-none rounded-xl focus:bg-surface-container-lowest focus:ring-0 focus:border-b focus:border-primary transition-all text-primary placeholder:text-outline/50 font-medium" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-4 text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Input Group: Confirm Password -->
<div class="space-y-2">
<label class="text-[10px] font-bold tracking-widest text-on-surface-variant uppercase ml-1">Xác nhận mật khẩu</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-container-low border-none rounded-xl focus:bg-surface-container-lowest focus:ring-0 focus:border-b focus:border-primary transition-all text-primary placeholder:text-outline/50 font-medium" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms & Privacy -->
<div class="flex items-start gap-3 pt-2">
<div class="pt-1">
<input class="w-5 h-5 rounded border-outline-variant/30 text-primary focus:ring-0 focus:ring-offset-0 transition-all bg-surface-container-low" id="terms" type="checkbox"/>
</div>
<label class="text-xs leading-relaxed text-on-surface-variant font-medium" for="terms">
                    Tôi đồng ý với <a class="text-primary font-bold underline decoration-surface-variant" href="#">Điều khoản</a> và <a class="text-primary font-bold underline decoration-surface-variant" href="#">Chính sách quyền riêng tư</a>
</label>
</div>
<!-- Action Button -->
<div class="pt-6">
<button class="w-full h-14 bg-primary text-on-primary-container rounded-xl lexend-font font-bold text-sm tracking-widest uppercase shadow-[0_12px_24px_rgba(26,28,28,0.1)] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Đăng ký
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Social Proof/Illustration - Asymmetric Accent -->
<div class="mt-12 mb-12 relative overflow-hidden rounded-xl h-24 bg-surface-container-low flex items-center p-6">
<div class="z-10">
<p class="text-[10px] font-bold tracking-widest text-on-surface-variant uppercase">Tham gia cùng</p>
<p class="lexend-font text-lg font-black text-primary">50,000+ Vận động viên</p>
</div>
<div class="absolute -right-4 -bottom-4 opacity-10">
<span class="material-symbols-outlined text-[100px]" data-icon="sports_tennis">sports_tennis</span>
</div>
</div>
<!-- Footer Navigation -->
<div class="w-full text-center pb-8 mt-auto">
<p class="text-[12px] text-on-surface-variant font-medium tracking-tight">
                Đã có tài khoản? <a class="text-primary font-extrabold uppercase ml-1 border-b-2 border-surface-variant" href="#">Đăng nhập</a>
</p>
</div>
</main>
<!-- Footer Fragment - Simplified for Authentication Flow -->
<footer class="bg-zinc-50 flex flex-col items-center gap-4 w-full text-center py-8">
<div class="flex gap-6">
<span class="font-['Inter'] text-[10px] font-medium tracking-widest uppercase text-zinc-400 hover:text-black transition-all">Support</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-widest uppercase text-zinc-400 hover:text-black transition-all">Privacy</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-widest uppercase text-zinc-400 hover:text-black transition-all">Terms</span>
</div>
<p class="font-['Inter'] text-[10px] font-medium tracking-widest uppercase text-zinc-400">
            © 2024 SPORTMATCH. ENGINEERED FOR PERFORMANCE.
        </p>
</footer>
</body></html>
