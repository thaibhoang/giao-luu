<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-primary": "#c0c6db",
                    "surface-container-low": "#f3f3f3",
                    "on-secondary-fixed-variant": "#323c4c",
                    "on-background": "#1a1c1c",
                    "tertiary-container": "#747474",
                    "secondary": "#555f70",
                    "primary": "#000000",
                    "on-primary": "#dce2f7",
                    "secondary-fixed": "#bdc7db",
                    "on-error-container": "#410002",
                    "background": "#f9f9f9",
                    "on-secondary-container": "#121c2a",
                    "surface-container": "#eeeeee",
                    "on-primary-container": "#ffffff",
                    "surface-container-highest": "#e2e2e2",
                    "surface-tint": "#575e70",
                    "outline": "#777777",
                    "secondary-container": "#cbd5e9",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed-variant": "#e2e2e2",
                    "primary-fixed-dim": "#404758",
                    "on-error": "#ffffff",
                    "on-tertiary-container": "#ffffff",
                    "error-container": "#ffdad6",
                    "inverse-surface": "#2f3131",
                    "surface-container-high": "#e8e8e8",
                    "surface-bright": "#f9f9f9",
                    "surface": "#f9f9f9",
                    "on-surface": "#1a1c1c",
                    "primary-fixed": "#575e70",
                    "on-surface-variant": "#474747",
                    "tertiary-fixed": "#5e5e5e",
                    "on-secondary": "#ffffff",
                    "surface-dim": "#dadada",
                    "on-primary-fixed-variant": "#dce2f7",
                    "tertiary-fixed-dim": "#474747",
                    "surface-variant": "#e2e2e2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Lexend"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; background-color: #f9f9f9; }
        .font-lexend { font-family: 'Lexend', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        /* Custom hide scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface">
<!-- TopAppBar -->
<header class="bg-white/80 dark:bg-black/80 backdrop-blur-xl fixed top-0 w-full z-50 flex items-center justify-between px-5 h-16 w-full">
<div class="flex items-center gap-4">
<button class="active:scale-95 duration-200 hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-black dark:text-white" data-icon="close">close</span>
</button>
<div>
<h1 class="font-lexend font-bold text-xl tracking-tight text-black dark:text-white">SỬA TIN</h1>
</div>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-black dark:text-white" data-icon="more_horiz">more_horiz</span>
</div>
</header>
<main class="pt-20 pb-32 px-5 max-w-2xl mx-auto">
<!-- Status Header -->
<div class="mb-8">
<p class="text-on-surface-variant text-sm font-medium">Đã đăng 2 giờ trước</p>
</div>
<form class="space-y-8">
<!-- 1. Sport Selection -->
<section>
<h2 class="font-lexend text-sm font-bold uppercase tracking-wider text-on-surface-variant mb-4">Môn thể thao</h2>
<div class="grid grid-cols-2 gap-3 p-1.5 bg-surface-container-low rounded-xl">
<button class="py-3 px-4 rounded-lg font-lexend font-bold text-sm transition-all bg-white text-black shadow-sm" type="button">
                        Cầu lông
                    </button>
<button class="py-3 px-4 rounded-lg font-lexend font-medium text-sm transition-all text-on-surface-variant hover:bg-white/50" type="button">
                        Pickleball
                    </button>
</div>
</section>
<!-- 2. Title Field -->
<section>
<label class="font-lexend text-sm font-bold uppercase tracking-wider text-on-surface-variant mb-3 block">Tiêu đề</label>
<input class="w-full bg-surface-container-low border-none rounded-xl p-4 font-body text-on-surface focus:ring-1 focus:ring-black focus:bg-white transition-all" type="text" value="Giao lưu cầu lông tối nay"/>
</section>
<!-- 3. Location Field -->
<section>
<div class="flex justify-between items-end mb-3">
<label class="font-lexend text-sm font-bold uppercase tracking-wider text-on-surface-variant">Địa điểm</label>
<button class="text-xs font-bold text-black border-b border-surface-variant pb-0.5" type="button">Chọn trên bản đồ</button>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg" data-icon="location_on">location_on</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-xl p-4 pl-12 font-body text-on-surface focus:ring-1 focus:ring-black focus:bg-white transition-all" type="text" value="Sân Cầu Lông Kỳ Hòa, Q.10"/>
</div>
<!-- Mini Map Preview Asymmetric Style -->
<div class="mt-3 h-32 rounded-xl overflow-hidden bg-surface-container-highest relative">
<img class="w-full h-full object-cover grayscale opacity-80" data-alt="simplified vector map of ho chi minh city district 10 with a single black marker pin" data-location="Ho Chi Minh City" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBlxkExC79T_X-f81Q8T6qZHI3T5zUEgyiy5_AFx0XXTTQS0UFkCU8Mr5Mveesvc6G1ligbSJdLAnhelXF47SZpOA2DQuFOaKhgQ0_YGdOVq7bciDeWZXdsxng6EZRC4LqdNXwwF-RqIGMm7FbwgiSHiRQzmYicjOnvnymm7xHOCu0IHWMCpoV1jcSK4nMbLmQRxA-b15b3xRZYa8CgIrpXMqHLNZRnp31O14LFZgnQo0pXXJvf9kP5su-KhjJpkiBm9R2_Wyy2Ow"/>
<div class="absolute inset-0 bg-black/5"></div>
</div>
</section>
<!-- 4. Date & Time -->
<section class="grid grid-cols-2 gap-4">
<div>
<label class="font-lexend text-sm font-bold uppercase tracking-wider text-on-surface-variant mb-3 block">Bắt đầu</label>
<div class="flex gap-2">
<input class="w-full bg-surface-container-low border-none rounded-xl p-3 text-sm font-body focus:ring-1 focus:ring-black" type="date" value="2023-10-27"/>
<input class="w-1/2 bg-surface-container-low border-none rounded-xl p-3 text-sm font-body focus:ring-1 focus:ring-black" type="time" value="19:00"/>
</div>
</div>
<div>
<label class="font-lexend text-sm font-bold uppercase tracking-wider text-on-surface-variant mb-3 block">Kết thúc</label>
<div class="flex gap-2">
<input class="w-full bg-surface-container-low border-none rounded-xl p-3 text-sm font-body focus:ring-1 focus:ring-black" type="time" value="21:00"/>
</div>
</div>
</section>
<!-- 5, 6. Players & Skill -->
<section class="grid grid-cols-2 gap-4">
<div>
<label class="font-lexend text-sm font-bold uppercase tracking-wider text-on-surface-variant mb-3 block">Số người cần</label>
<div class="flex items-center bg-surface-container-low rounded-xl">
<button class="p-4 text-black" type="button"><span class="material-symbols-outlined" data-icon="remove">remove</span></button>
<input class="w-full bg-transparent border-none text-center font-lexend font-bold focus:ring-0" type="number" value="2"/>
<button class="p-4 text-black" type="button"><span class="material-symbols-outlined" data-icon="add">add</span></button>
</div>
</div>
<div>
<label class="font-lexend text-sm font-bold uppercase tracking-wider text-on-surface-variant mb-3 block">Trình độ</label>
<select class="w-full bg-surface-container-low border-none rounded-xl p-4 font-body text-on-surface focus:ring-1 focus:ring-black">
<option>Mới chơi</option>
<option selected="">Trung bình</option>
<option>Khá</option>
<option>Chuyên nghiệp</option>
</select>
</div>
</section>
<!-- 7. Price -->
<section>
<label class="font-lexend text-sm font-bold uppercase tracking-wider text-on-surface-variant mb-3 block">Chi phí dự kiến / người</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl p-4 font-lexend font-bold text-on-surface focus:ring-1 focus:ring-black focus:bg-white transition-all" type="text" value="50.000 VND"/>
<div class="absolute right-4 inset-y-0 flex items-center">
<span class="text-on-surface-variant text-xs font-bold">VND</span>
</div>
</div>
</section>
<!-- 8. Contact -->
<section>
<label class="font-lexend text-sm font-bold uppercase tracking-wider text-on-surface-variant mb-3 block">Thông tin liên hệ</label>
<div class="relative">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg" data-icon="link">link</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-xl p-4 pl-12 font-body text-on-surface focus:ring-1 focus:ring-black focus:bg-white transition-all" placeholder="Link Facebook hoặc SĐT" type="text" value="fb.com/user"/>
</div>
</section>
</form>
</main>
<!-- Fixed Bottom Button -->
<div class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md p-5 border-t border-surface-container-high z-50">
<div class="max-w-2xl mx-auto">
<button class="w-full h-14 bg-black text-white rounded-xl font-lexend font-bold text-base shadow-lg shadow-black/10 active:scale-[0.98] transition-transform">
                Lưu thay đổi
            </button>
</div>
</div>
<!-- BottomNavBar (Hidden for Transactional/Edit Screens as per Shell Visibility Rule) -->
<!-- The prompt specifies "Lưu thay đổi" is fixed full-width at bottom, which overrides the global bottom nav for this transactional flow -->
</body></html>
