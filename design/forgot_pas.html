</div>

<div class="space-y-8">

<label class="font-headline text-[10px] font-bold tracking-widest uppercase text-on-surface-variant ml-1" for="email">

<div class="relative group">
<input class="w-full h-14 px-5 bg-surface-container-low border-none rounded-xl font-body text-primary placeholder:text-outline focus:ring-0 focus:bg-surface-container-lowest focus:border-b focus:border-primary transition-all duration-300" id="email" placeholder="ten@vi-du.com" type="email"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-primary text-on-primary-container font-headline font-bold rounded-xl shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">

<span class="material-symbols-outlined text-sm" data-icon="send">send</span>

</div>

<div class="mt-8 text-center">

            </a>
</div>

<div class="font-headline text-8xl font-black tracking-tighter leading-none -ml-12 select-none pointer-events-none">
