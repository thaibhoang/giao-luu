services:
  postgres:
    # Lưu ý: major version phải khớp với web.build.args.PG_MAJOR
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: giao_luu_development
    ports:
      - "54322:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d giao_luu_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: development
      args:
        DEV_IMAGE: "true"
        PG_MAJOR: "16"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./web:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:80"
    env_file:
      - web/.env
    environment:
      RAILS_ENV: development
      PORT: "80"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/giao_luu_development
      RAILS_INTERNAL_URL: http://web:80
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      # RAILS_MASTER_KEY is read from web/.env (env_file above). Set it there or export on host.
      SCRAPER_HMAC_SECRET: ${SCRAPER_HMAC_SECRET:-dev-secret}
      CHAT_HMAC_SECRET: ${CHAT_HMAC_SECRET:-dev-chat-secret}

  # scraper:
  #   build:
  #     context: ./scraper
  #     dockerfile: Dockerfile
  #   depends_on:
  #     - web
  #   environment:
  #     RAILS_INTERNAL_URL: http://web:80
  #     SCRAPER_HMAC_SECRET: ${SCRAPER_HMAC_SECRET:-dev-secret}
  #   restart: "no"

  chat:
    build:
      context: ./chat
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/giao_luu_development
      CHAT_HMAC_SECRET: ${CHAT_HMAC_SECRET:-dev-chat-secret}
      RAILS_INTERNAL_URL: http://web:80
      PORT: "8081"
    restart: unless-stopped

volumes:
  postgres_data:
  bundle_cache:
