services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: giao_luu_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d giao_luu_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:80"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/giao_luu_development
      RAILS_INTERNAL_URL: http://web:80

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    depends_on:
      - web
    environment:
      RAILS_INTERNAL_URL: http://web:80
    # Binary stub; sau này scraper gọi ingest Rails qua biến này
    restart: "no"

volumes:
  postgres_data:
