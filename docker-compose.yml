services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: giao_luu_development
    ports:
      - "54322:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d giao_luu_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: development
      args:
        DEV_IMAGE: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:80"
    environment:
      RAILS_ENV: development
      PORT: "80"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/giao_luu_development
      RAILS_INTERNAL_URL: http://web:80
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      # Tuỳ chọn: export RAILS_MASTER_KEY trước khi up, hoặc thêm vào web/.env (compose không đọc web/.env trừ khi khai báo env_file)
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:-}
      SCRAPER_HMAC_SECRET: ${SCRAPER_HMAC_SECRET:-dev-secret}

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    depends_on:
      - web
    environment:
      RAILS_INTERNAL_URL: http://web:80
      SCRAPER_HMAC_SECRET: ${SCRAPER_HMAC_SECRET:-dev-secret}
    restart: "no"

volumes:
  postgres_data:
